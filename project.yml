name: LyricsCarPlay
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
targets:
  LyricsCarPlay:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.LyricsCarPlay
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/LyricsCarPlay.entitlements
    dependencies:
      - target: LyricsWidgetExtension
  LyricsWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.LyricsCarPlay.widget
        INFOPLIST_FILE: Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widget/LyricsWidget.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES

