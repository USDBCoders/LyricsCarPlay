name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project LyricsCarPlay.xcodeproj \
            -scheme LyricsCarPlay \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            clean build | tee "$RUNNER_TEMP/xcodebuild.log"

      - name: Package simulator application
        run: |
          cd "$RUNNER_TEMP/DerivedData/Build/Products/Debug-iphonesimulator"
          ditto -c -k --sequesterRsrc --keepParent LyricsCarPlay.app "$GITHUB_WORKSPACE/LyricsCarPlay-simulator.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LyricsCarPlay-simulator
          path: LyricsCarPlay-simulator.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ${{ runner.temp }}/xcodebuild.log
          if-no-files-found: ignore

