      - name: Locate application
        run: |
          APP_PATH="$RUNNER_TEMP/DerivedData/Build/Products/Release-iphoneos/LyricsCarPlay.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Application introuvable : $APP_PATH"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      # AJOUTER ICI
      - name: Validate all bundles
        run: |
          set -e

          find "$APP_PATH" \
            \( -name "*.app" -o -name "*.appex" \) \
            -print0 |
          while IFS= read -r -d '' BUNDLE; do
            PLIST="$BUNDLE/Info.plist"
            echo "Validation de $BUNDLE"

            if [ ! -f "$PLIST" ]; then
              echo "::error::Info.plist absent dans $BUNDLE"
              exit 1
            fi

            BUNDLE_ID=$(/usr/libexec/PlistBuddy \
              -c "Print :CFBundleIdentifier" \
              "$PLIST")

            echo "CFBundleIdentifier=$BUNDLE_ID"

            if [ -z "$BUNDLE_ID" ] ||
               [[ "$BUNDLE_ID" == *'$('* ]]; then
              echo "::error::CFBundleIdentifier invalide"
              exit 1
            fi
          done

      - name: Create unsigned IPA
        run: |
          mkdir -p "$RUNNER_TEMP/IPA/Payload"
          cp -R \
            "$APP_PATH" \
            "$RUNNER_TEMP/IPA/Payload/"
          cd "$RUNNER_TEMP/IPA"
          /usr/bin/zip \
            -qry \
            "$GITHUB_WORKSPACE/LyricsCarPlay-unsigned.ipa" \
            Payload
